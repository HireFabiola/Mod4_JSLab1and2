<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <script defer src="index.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-image: url("AdobeStock_185397671.jpeg"); /* Specify the image path */
            background-repeat: no-repeat;           /* Prevents the image from tiling */
            /*background-size: cover;                  /* Resizes the image to cover the entire container */
            background-position: center;             /* Centers the image in the body */
            background-attachment: fixed;            /* Keeps the image fixed while scrolling */
        }
    </style>
</head>

<body>
    
    <h1 style="text-align: center;">Fabiola's Shopping List</h1>
 <div class="container mt-4 d-flex align-items-center justify-content-center">
        <div class="row w-100">
    <div class="col-md-6">
    <input id="itemInput" type="text" placeholder="Enter an item" />
    <button id="addItemButton">Add Item</button>
    <button id="removeItemButton">Remove Last Item</button>
     <ul id="cart"></ul>
    </div>
   <div class="col-md-6">
    <div class="searchBox">
        <input type="text" id="searchInput" placeholder="Search Item on List">
        <button id="searchButton">Search</button>
    </div>
    <div id="results">
    
    </div>
    </div>
   
    </div>
</body>

</html>
